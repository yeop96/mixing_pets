<script type="text/babel" data-type="module">
const {useState,useEffect,useRef,memo,useMemo,useCallback}=React;

/* ═══ CHIPTUNE SOUND ENGINE ═══ */
const SFX=(()=>{
  let ctx=null;
  let muted=false;
  const V=0.12;
  const init=()=>{
    try{
      if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();
      if(ctx.state==='suspended')ctx.resume();
    }catch(e){}
  };
  const beep=(freq,dur,type,v,delay)=>{
    if(muted)return;
    try{
      init();if(!ctx)return;
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type=type||'square';o.frequency.value=freq;
      const t=ctx.currentTime+(delay||0);
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(v||V,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,t+dur);
      o.connect(g);g.connect(ctx.destination);
      o.start(t);o.stop(t+dur+0.05);
    }catch(e){}
  };
  const S='square',T='triangle';
  return{
    get muted(){return muted},
    toggleMute(){muted=!muted;return muted},
    click(){beep(800,.06,S,.08)},
    nav(){beep(600,.04,S,.06)},
    ok(){beep(523,.08,S);beep(659,.08,S,V,.09);beep(784,.15,S,V,.18)},
    back(){beep(500,.06,S);beep(400,.08,S,V,.07)},
    feed(){beep(523,.07,S);beep(659,.07,S,V,.08);beep(784,.1,T,V,.16)},
    buy(){beep(440,.06,S);beep(554,.06,S,V,.07);beep(659,.06,S,V,.14);beep(880,.12,T,V,.21)},
    starCatch(){beep(988,.1,T,.1)},
    cardFlip(){beep(660,.05,S,.06)},
    cardMatch(){beep(659,.08,S);beep(784,.08,S,V,.09);beep(1047,.12,T,V,.18)},
    rpsWin(){beep(523,.08,S);beep(659,.08,S,V,.09);beep(784,.08,S,V,.18);beep(1047,.15,T,V,.27)},
    rpsLose(){beep(400,.12,S);beep(300,.15,S,V,.13)},
    rpsDraw(){beep(500,.1,S);beep(500,.1,S,V,.12)},
    hatch1(){beep(440,.15,S,.1)},
    hatch2(){beep(440,.1,S);beep(554,.1,S,V,.11)},
    born(){beep(523,.1,T);beep(659,.1,T,V,.11);beep(784,.1,T,V,.22);beep(1047,.08,T,V,.33);beep(1319,.2,T,V,.42)},
    mixStart(){beep(330,.12,T);beep(440,.12,T,V,.13);beep(554,.12,T,V,.26);beep(659,.12,T,V,.39)},
    mixDone(){beep(784,.1,T);beep(988,.1,T,V,.11);beep(1175,.1,T,V,.22);beep(1319,.08,T,V,.33);beep(1568,.2,S,V,.42)},
    hungry(){beep(350,.15,S);beep(300,.2,S,.08,.16)},
    happy(){beep(659,.06,T,.06);beep(784,.06,T,.06,.07);beep(880,.08,T,.06,.14)},
    title(){beep(523,.12,T,.08);beep(659,.12,T,.08,.13);beep(784,.12,T,.08,.26);beep(1047,.08,T,.08,.39);beep(784,.08,T,.08,.48);beep(659,.08,T,.08,.57);beep(784,.08,T,.08,.66);beep(1047,.2,S,.06,.75)},
    gameOver(){beep(784,.1,T);beep(659,.1,T,V,.11);beep(523,.1,T,V,.22);beep(440,.2,T,V,.33)},
    sick(){beep(200,.2,S,.08);beep(180,.3,S,.06,.21)},
    medicine(){beep(523,.08,T);beep(659,.08,T,V,.09);beep(784,.1,T,V,.18);beep(1047,.15,T,V,.27)},
    angel(){beep(784,.15,T,.06);beep(659,.15,T,.06,.16);beep(523,.15,T,.06,.32);beep(440,.3,T,.06,.48)},
    dateReveal(){beep(330,.1,T);beep(440,.1,T,V,.11);beep(554,.15,T,V,.22)},
    dateAccept(){beep(523,.08,S);beep(659,.08,S,V,.09);beep(784,.12,T,V,.18)},
    dateReject(){beep(400,.08,S);beep(350,.1,S,V,.09)},
    growUp(){beep(523,.1,T);beep(659,.1,T,V,.12);beep(784,.1,T,V,.24);beep(1047,.15,T,V,.36)},
    runaway(){beep(400,.15,T,.06);beep(350,.15,T,.06,.16);beep(300,.15,T,.06,.32);beep(250,.3,T,.06,.48)},
    pet(){beep(880,.05,T,.06);beep(988,.06,T,.06,.06)},
    tickle(){beep(784,.04,T,.06);beep(880,.04,T,.06,.05);beep(988,.04,T,.06,.1);beep(1047,.06,T,.06,.15)},
    poop(){beep(200,.08,S,.05);beep(150,.1,S,.04,.09)},
    clean(){beep(523,.06,T,.06);beep(659,.06,T,.06,.07);beep(784,.08,T,.06,.14)},
    bath(){beep(659,.08,T,.06);beep(784,.06,T,.06,.09);beep(880,.06,T,.06,.16);beep(1047,.1,T,.06,.23)},
    sleep(){beep(330,.2,T,.04);beep(262,.3,T,.03,.22)},
    wake(){beep(440,.08,T,.06);beep(554,.08,T,.06,.09);beep(659,.1,T,.06,.18)},
  };
})();

/* ═══ PIXEL ENGINE ═══ */
const SW=36,SH=40,CX=18,OLC=[43,29,52];
function pxC(x,c,cx,cy,r){x.fillStyle=c;const r2=r*r+r*.45;for(let dy=-Math.ceil(r);dy<=Math.ceil(r);dy++)for(let dx=-Math.ceil(r);dx<=Math.ceil(r);dx++)if(dx*dx+dy*dy<=r2)x.fillRect(Math.round(cx+dx),Math.round(cy+dy),1,1)}
function pxE(x,c,cx,cy,rx,ry){x.fillStyle=c;for(let dy=-Math.ceil(ry);dy<=Math.ceil(ry);dy++)for(let dx=-Math.ceil(rx);dx<=Math.ceil(rx);dx++)if(dx*dx/(rx*rx+.5)+dy*dy/(ry*ry+.5)<=1)x.fillRect(Math.round(cx+dx),Math.round(cy+dy),1,1)}
function pxTri(x,c,x1,y1,x2,y2,x3,y3){x.fillStyle=c;const mY=Math.floor(Math.min(y1,y2,y3)),MY=Math.ceil(Math.max(y1,y2,y3)),mX=Math.floor(Math.min(x1,x2,x3)),MX=Math.ceil(Math.max(x1,x2,x3));for(let y=mY;y<=MY;y++)for(let xx=mX;xx<=MX;xx++){const d1=(xx-x2)*(y1-y2)-(x1-x2)*(y-y2),d2=(xx-x3)*(y2-y3)-(x2-x3)*(y-y3),d3=(xx-x1)*(y3-y1)-(x3-x1)*(y-y1);if(!((d1<0||d2<0||d3<0)&&(d1>0||d2>0||d3>0)))x.fillRect(xx,y,1,1)}}
function olSz(ctx,w,h){const id=ctx.getImageData(0,0,w,h),d=id.data,out=[];for(let y=0;y<h;y++)for(let x=0;x<w;x++){const i=(y*w+x)*4;if(d[i+3]<128)continue;for(const[dx,dy]of[[-1,0],[1,0],[0,-1],[0,1]]){const nx=x+dx,ny=y+dy;if(nx<0||nx>=w||ny<0||ny>=h)continue;if(d[(ny*w+nx)*4+3]<128)out.push(nx,ny)}}for(let k=0;k<out.length;k+=2){const i=(out[k+1]*w+out[k])*4;d[i]=OLC[0];d[i+1]=OLC[1];d[i+2]=OLC[2];d[i+3]=255}ctx.putImageData(id,0,0)}

/* ═══ ICON CACHE ═══ */
const IC={};
function mkI(k,w,h,fn){if(IC[k])return IC[k];const c=document.createElement('canvas');c.width=w;c.height=h;const x=c.getContext('2d');x.imageSmoothingEnabled=false;fn(x);olSz(x,w,h);IC[k]=c.toDataURL();return IC[k]}

function PxI({n,size=24}){
  const src=useMemo(()=>{const S=16;return mkI(n,S,S,x=>{
    switch(n){
      case"home":pxTri(x,"#ff8fab",8,1,1,7,15,7);x.fillStyle="#ffe4ec";x.fillRect(3,7,10,8);x.fillStyle="#b59af8";x.fillRect(6,10,4,5);x.fillStyle="#7ec8e3";x.fillRect(10,8,2,2);break;
      case"feed":pxE(x,"#d06838",8,9,5,5);pxE(x,"#ffcab0",8,8,4,4);pxC(x,"#ff9a6c",5,5,2);pxC(x,"#ff9a6c",11,5,2);x.fillStyle="#d06838";x.fillRect(7,3,2,3);break;
      case"game":x.fillStyle="#b59af8";x.fillRect(2,5,12,8);x.fillRect(3,4,10,1);x.fillRect(3,13,10,1);x.fillStyle="#ffd166";x.fillRect(4,7,2,2);x.fillRect(4,10,2,2);pxC(x,"#ff4d6d",11,8,1);pxC(x,"#ff4d6d",11,11,1);break;
      case"shop":x.fillStyle="#7ec8e3";x.fillRect(2,3,12,2);x.fillRect(1,5,14,1);x.fillStyle="#ffe8a8";x.fillRect(3,6,10,8);x.fillStyle="#ffd166";x.fillRect(3,6,10,1);x.fillStyle="#ff8fab";x.fillRect(6,8,4,3);break;
      case"mix":x.fillStyle="#ff4d6d";[{x:3,y:4,w:2},{x:7,y:4,w:2},{x:2,y:5,w:2},{x:8,y:5,w:2},{x:2,y:6,w:3},{x:7,y:6,w:3},{x:2,y:7,w:8},{x:3,y:8,w:6},{x:4,y:9,w:4},{x:5,y:10,w:2}].forEach(r=>x.fillRect(r.x,r.y,r.w,1));x.fillStyle="#ffd166";x.fillRect(11,2,2,2);x.fillRect(12,1,1,1);break;
      case"tree":pxC(x,"#7ed4a8",8,4,4);pxC(x,"#4aaa7a",6,3,2);x.fillStyle="#d06838";x.fillRect(7,8,2,6);x.fillStyle="#ffd166";x.fillRect(6,3,1,1);break;
      case"coin":pxC(x,"#d4a030",8,8,5);pxC(x,"#ffd166",7,7,4);x.fillStyle="#ffe8a8";x.fillRect(6,5,1,1);x.fillStyle="#d4a030";x.fillRect(7,6,2,4);break;
      case"hunger":pxE(x,"#ff9a6c",8,9,6,5);pxE(x,"#ffcab0",7,8,4,3);x.fillStyle="#d06838";x.fillRect(6,3,1,4);x.fillRect(8,2,1,4);x.fillRect(10,3,1,4);break;
      case"happy":x.fillStyle="#ff4d6d";[{x:2,y:4,w:3},{x:8,y:4,w:3},{x:1,y:5,w:4},{x:7,y:5,w:4},{x:1,y:7,w:10},{x:2,y:9,w:8},{x:3,y:10,w:6},{x:4,y:11,w:4},{x:5,y:12,w:2}].forEach(r=>x.fillRect(r.x,r.y,r.w,1));x.fillRect(1,6,10,1);break;
      case"star":x.fillStyle="#ffd166";x.fillRect(7,1,2,2);x.fillRect(6,3,4,1);x.fillRect(2,4,12,2);x.fillRect(3,6,10,1);x.fillRect(4,7,8,1);x.fillRect(5,8,6,1);x.fillRect(4,9,3,1);x.fillRect(9,9,3,1);x.fillRect(3,10,2,1);x.fillRect(11,10,2,1);break;
      case"cards":x.fillStyle="#b59af8";x.fillRect(1,2,8,11);x.fillStyle="#ffd166";x.fillRect(3,5,4,1);x.fillRect(4,6,2,2);x.fillStyle="#7ec8e3";x.fillRect(7,4,8,11);x.fillStyle="#ff4d6d";x.fillRect(10,7,2,1);x.fillRect(9,8,4,1);break;
      case"rps":pxC(x,"#ffcab0",8,8,5);pxC(x,"#ffe4ec",7,7,3);x.fillStyle="#d06838";x.fillRect(5,5,2,1);x.fillRect(8,5,2,1);x.fillStyle="#ff4d6d";x.fillRect(6,10,4,1);break;
      case"sweat":x.fillStyle="#7ec8e3";x.fillRect(7,2,2,1);x.fillRect(6,3,4,2);x.fillRect(7,5,2,1);break;
      case"sad":x.fillStyle="#7ec8e3";x.fillRect(4,8,2,3);x.fillRect(10,8,2,3);break;
      case"medicine":x.fillStyle="#ff4d6d";x.fillRect(6,2,4,12);x.fillRect(2,6,12,4);x.fillStyle="#fff";x.fillRect(7,3,2,10);x.fillRect(3,7,10,2);break;
      case"sick":x.fillStyle="#ffd166";x.fillRect(7,1,2,10);x.fillRect(6,11,4,2);pxC(x,"#ff4d6d",8,13,2);x.fillStyle="#ff4d6d";x.fillRect(6,4,1,3);break;

/* ═══ BLIND DATE SYSTEM ═══ */
function generatePartner(history){
  const r=Math.random();
  let ch;
  if(r<0.6||history.length===0){
    // 60%: random BASE character
    ch={...BASE[Math.floor(Math.random()*BASE.length)]};
  }else if(r<0.85){
    // 25%: "wild" mix of 2 random BASE chars
    const a=BASE[Math.floor(Math.random()*BASE.length)];
    const b=BASE[Math.floor(Math.random()*BASE.length)];
    ch=mixChars(a,b);
  }else{
    // 15%: from history
    ch={...history[Math.floor(Math.random()*history.length)]};
  }
  // Apply slight color mutation for variety
  const shift=()=>Math.floor(Math.random()*30)-15;
  const mutC=h=>{const[r,g,b]=hex2rgb(h);return rgb2hex(r+shift(),g+shift(),b+shift())};
  ch.pal={m:mutC(ch.pal.m),l:mutC(ch.pal.l),d:mutC(ch.pal.d),a:mutC(ch.pal.a)};
  ch.id=Date.now()+Math.random();
  ch.name=rand(NP)+rand(NS);
  return ch;
}
function calcCompatibility(a,b){
  let s=50;
  if(a.species===b.species)s+=15;
  if(a.eyes===b.eyes)s+=5;
  if(a.mouth===b.mouth)s+=5;
  const[r1,g1,b1]=hex2rgb(a.pal.m),[r2,g2,b2]=hex2rgb(b.pal.m);
  const dist=Math.sqrt((r1-r2)**2+(g1-g2)**2+(b1-b2)**2);
  s+=dist>200?10:dist>100?5:-5;
  s+=Math.floor(Math.random()*20)-10;
  return Math.max(10,Math.min(100,Math.round(s)));
}

function StarGame({pet,onEnd}){
  const W=9,H=12;
  const[pos,setPos]=useState(4);
  const[stars,setStars]=useState([]);
  const[score,setScore]=useState(0);
  const[time,setTime]=useState(15);
  const[act,setAct]=useState(true);
  const scoreRef=useRef(0);

  useEffect(()=>{
    const iv=setInterval(()=>setTime(t=>{if(t<=1){setAct(false);clearInterval(iv);return 0}return t-1}),1000);
    return()=>clearInterval(iv);
  },[]);
  useEffect(()=>{if(!act)SFX.gameOver()},[act]);

  useEffect(()=>{
    if(!act)return;
    let frame=0;
    let raf;
    const loop=()=>{
      frame++;
      if(frame%8===0){
        setStars(p=>[...p,{x:Math.floor(Math.random()*W),y:0,id:Date.now()+Math.random()}]);
      }
      setStars(p=>p.map(s=>({...s,y:s.y+1})).filter(s=>s.y<H));
      raf=requestAnimationFrame(loop);
    };
    raf=requestAnimationFrame(loop);
    return()=>cancelAnimationFrame(raf);
  },[act]);

  // Collision check in separate effect with pos only
  const posRef=useRef(pos);
  posRef.current=pos;
  useEffect(()=>{
    const iv=setInterval(()=>{
      setStars(prev=>{
        let caught=0;
        const remaining=prev.filter(s=>{
          if(s.y>=H-2 && s.x===posRef.current){caught++;return false}
          return true;
        });
        if(caught>0){
          scoreRef.current+=caught;
          setScore(scoreRef.current);
          SFX.starCatch();
        }
        return remaining;
      });
    },100);
    return()=>clearInterval(iv);
  },[]);

  if(!act){
    const coins=scoreRef.current*5;
    return(<div style={{textAlign:"center",padding:16}}>
      <div style={{fontSize:14,fontWeight:900,color:"#2b1d34",marginBottom:6}}>게임 종료!</div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4,marginBottom:4}}><PxI n="star" size={22}/><span style={{fontSize:20,fontWeight:900,color:"#d4a030"}}>{scoreRef.current}개</span></div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:3,marginBottom:14}}><PxI n="coin" size={14}/><span style={{fontSize:12,color:"#888"}}>+{coins}</span></div>
      <button className="btn btn-m" onClick={()=>onEnd(coins)}>확인</button>
    </div>);
  }
  return(<div style={{textAlign:"center"}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,padding:"0 4px"}}>
      <span style={{display:"flex",alignItems:"center",gap:2,fontSize:10,fontWeight:700,color:"#888"}}><PxI n="star" size={12}/>{score}</span>
      <span style={{fontSize:10,fontWeight:700,color:time<=5?"#ff4d6d":"#888"}}>⏱{time}s</span>
    </div>
    <div style={{position:"relative",width:W*20,height:H*20,margin:"0 auto",background:"linear-gradient(180deg,#1a1028,#2a1848)",borderRadius:6,overflow:"hidden",border:"2px solid #3a2a4a"}}>
      {stars.map(s=><div key={s.id} style={{position:"absolute",left:s.x*20+2,top:s.y*20}}><PxI n="star" size={16}/></div>)}
      <div style={{position:"absolute",left:pos*20,bottom:0,width:20,height:22,display:"flex",alignItems:"flex-end",justifyContent:"center"}}><PxChar ch={pet} size={18}/></div>
    </div>
    <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:6}}>
      <button className="btn btn-s" onClick={()=>setPos(p=>Math.max(0,p-1))} style={{padding:"7px 18px"}}>◀</button>
      <button className="btn btn-s" onClick={()=>setPos(p=>Math.min(W-1,p+1))} style={{padding:"7px 18px"}}>▶</button>
    </div>
  </div>);
}

function MemGame({onEnd}){
  const ICS=["star","happy","coin","feed","mix","home"];
  const[cards,setCards]=useState(()=>{const p=[...ICS,...ICS];for(let i=p.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[p[i],p[j]]=[p[j],p[i]]}return p.map((e,i)=>({id:i,ic:e,f:false,m:false}))});
  const[sel,setSel]=useState([]);
  const[mv,setMv]=useState(0);
  const[dn,setDn]=useState(false);

  const flip=i=>{
    if(sel.length>=2||cards[i].f||cards[i].m)return;
    SFX.cardFlip();
    const nc=[...cards];nc[i]={...nc[i],f:true};setCards(nc);
    const ns=[...sel,i];setSel(ns);
    if(ns.length===2){
      setMv(m=>m+1);
      if(nc[ns[0]].ic===nc[ns[1]].ic){
        setTimeout(()=>{SFX.cardMatch();setCards(p=>{const u=[...p];u[ns[0]]={...u[ns[0]],m:true};u[ns[1]]={...u[ns[1]],m:true};return u});setSel([])},300);
      }else{
        setTimeout(()=>{SFX.back();setCards(p=>{const u=[...p];u[ns[0]]={...u[ns[0]],f:false};u[ns[1]]={...u[ns[1]],f:false};return u});setSel([])},600);
      }
    }
  };

  useEffect(()=>{if(cards.every(c=>c.m)&&!dn){setDn(true);SFX.mixDone()}},[cards,dn]);

  if(dn){const coins=Math.max(5,30-mv*2);return(<div style={{textAlign:"center",padding:16}}>

    <button className="btn btn-m" onClick={()=>onEnd(coins)}>확인</button>
  </div>)}

  return(<div style={{textAlign:"center"}}>
    <div style={{fontSize:10,fontWeight:700,color:"#888",marginBottom:4}}>시도: {mv}회</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:3,maxWidth:192,margin:"0 auto"}}>
      {cards.map((c,i)=><div key={c.id} onClick={()=>flip(i)} style={{width:42,height:42,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",background:c.m?"rgba(126,212,168,.12)":c.f?"#fff":"linear-gradient(135deg,#3a2a5a,#4a3a6a)",border:c.m?"2px solid #7ed4a8":"2px solid rgba(0,0,0,.06)",opacity:c.m?0.35:1}}>

      </div>)}
    </div>
  </div>);

function RPSGame({pet,onEnd}){
  const NM=["바위","보","가위"];
  const[wins,setWins]=useState(0);
  const[rd,setRd]=useState(0);
  const[res,setRes]=useState(null);
  const[pm,setPm]=useState(null);
  const[mm,setMm]=useState(null);
  const winsRef=useRef(0);

  const play=me=>{
    if(res!==null)return;
    SFX.click();
    const them=Math.floor(Math.random()*3);
    setMm(me);setPm(them);
    const w=(me===0&&them===2)||(me===1&&them===0)||(me===2&&them===1);
    const dr=me===them;
    setRes(dr?"무승부":w?"승리!":"패배...");
    if(w){winsRef.current++;setWins(winsRef.current);setTimeout(()=>SFX.rpsWin(),200)}
    else if(dr){setTimeout(()=>SFX.rpsDraw(),200)}
    else{setTimeout(()=>SFX.rpsLose(),200)}
    setTimeout(()=>{
      if(rd+1>=5){onEnd(winsRef.current*8)}
      else{setRd(r=>r+1);setRes(null);setPm(null);setMm(null)}
    },1000);
  };

  return(<div style={{textAlign:"center"}}>
    <div style={{fontSize:10,fontWeight:700,color:"#888",marginBottom:6}}>라운드 {rd+1}/5 · 승리: {wins}</div>

    {!res&&<div style={{display:"flex",gap:6,justifyContent:"center"}}>{[0,1,2].map(i=>
      <button key={i} className="btn btn-s" onClick={()=>play(i)} style={{padding:"5px 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
        <RpsIcon t={i} sz={26}/><span style={{fontSize:8}}>{NM[i]}</span>
      </button>
    )}</div>}
  </div>);
}

/* ═══ 올라올라 (Zigzag Climb) ═══ */
function ZigzagGame({pet,onEnd}){
  const W=9,CELL=18;
  const[px,setPx]=useState(4);
  const[dir,setDir]=useState(1);
  const[row,setRow]=useState(0);
  const[act,setAct]=useState(true);
  const[ready,setReady]=useState(3);// countdown
  const state=useRef({px:4,dir:1,row:0,act:true,walls:[]});

  // Generate walls
  useEffect(()=>{
    const w=[];for(let i=0;i<200;i++){
      const safe=i<3;// first 3 rows no walls
      const side=Math.random()>.5?'L':'R';
      const len=safe?0:1+Math.floor(Math.random()*(i>40?3:i>20?2:1));
      w.push({side,len});
    }
    state.current.walls=w;
  },[]);

  // Countdown
  useEffect(()=>{
    if(ready<=0)return;
    const t=setTimeout(()=>setReady(r=>r-1),800);
    return()=>clearTimeout(t);
  },[ready]);

  // Game loop with setTimeout chain for dynamic speed
  useEffect(()=>{
    if(!act||ready>0)return;
    let tid;
    const step=()=>{
      const s=state.current;
      if(!s.act)return;
      const np=s.px+s.dir;
      const wall=s.walls[s.row+1]||{side:'L',len:0};
      let blocked=np<0||np>=W;
      if(!blocked&&wall.side==='L'){for(let i=0;i<wall.len;i++)if(np===i)blocked=true}
      if(!blocked&&wall.side==='R'){for(let i=0;i<wall.len;i++)if(np===W-1-i)blocked=true}
      if(blocked){
        s.act=false;setAct(false);SFX.gameOver();
      }else{
        s.px=np;s.row++;
        setPx(np);setRow(s.row);
        if(s.row%5===0)SFX.starCatch();
        const spd=Math.max(120,350-s.row*3);
        tid=setTimeout(step,spd);
      }
    };
    tid=setTimeout(step,400);
    return()=>clearTimeout(tid);
  },[act,ready]);

  const flip=()=>{if(state.current.act&&ready<=0){SFX.click();state.current.dir*=-1;setDir(d=>d*-1)}};

  if(!act){
    const sc=state.current.row;const coins=Math.min(50,Math.floor(sc/2));
    return(<div style={{textAlign:"center",padding:16}}>
      <div style={{fontSize:14,fontWeight:900,color:"#2b1d34",marginBottom:6}}>게임 종료!</div>
      <div style={{fontSize:20,fontWeight:900,color:"#b59af8",marginBottom:4}}>{sc}층</div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:3,marginBottom:14}}><PxI n="coin" size={14}/><span style={{fontSize:12,color:"#888"}}>+{coins}</span></div>
      <button className="btn btn-m" onClick={()=>onEnd(coins)}>확인</button>
    </div>);
  }
  const H=14;const walls=state.current.walls;
  return(<div style={{textAlign:"center"}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,padding:"0 4px"}}>
      <span style={{fontSize:10,fontWeight:700,color:"#888"}}>{row}층</span>
      <span style={{fontSize:10,fontWeight:700,color:"#b59af8"}}>올라올라!</span>
    </div>
    <div style={{position:"relative",width:W*CELL,height:H*CELL,margin:"0 auto",background:"linear-gradient(180deg,#1a1028,#2a1848)",borderRadius:6,overflow:"hidden",border:"2px solid #3a2a4a",cursor:"pointer"}} onClick={flip}>
      {ready>0&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",zIndex:5,background:"rgba(0,0,0,.5)"}}>
        <span style={{fontSize:28,fontWeight:900,color:"#ffd166",animation:"popIn .4s ease"}}>{ready}</span>
      </div>}
      {/* Walls */}
      {Array.from({length:H}).map((_,vi)=>{
        const ri=Math.max(0,row-2)+vi;
        const w=walls[ri]||{side:'L',len:0};
        return Array.from({length:w.len}).map((_,j)=>{
          const wx=w.side==='L'?j:W-1-j;
          return <div key={vi+'-'+j} style={{position:"absolute",left:wx*CELL,top:(H-1-vi)*CELL,width:CELL,height:CELL,background:"linear-gradient(135deg,#ff4d6d,#d45c7f)",borderRadius:2}}/>;
        });
      })}
      <div style={{position:"absolute",left:px*CELL+(CELL-16)/2,top:(H-3)*CELL,zIndex:2}}>
        <PxChar ch={pet} size={16}/>
      </div>
      {/* Direction arrow */}
      <div style={{position:"absolute",left:px*CELL+(CELL-16)/2+(dir>0?18:-12),top:(H-3)*CELL+4,fontSize:10,color:"#ffd166",fontWeight:900,zIndex:3}}>{dir>0?"→":"←"}</div>
    </div>
    <div style={{marginTop:6,fontSize:9,color:"#aaa"}}>탭해서 방향 전환!</div>
  </div>);
}

/* ═══ 받아받아 (Catch & Dodge) ═══ */
function CatchGame({pet,onEnd}){
  const W=7,H=10,CELL=22;
  const[pos,setPos]=useState(3);
  const[items,setItems]=useState([]);
  const[score,setScore]=useState(0);
  const[lives,setLives]=useState(3);
  const[time,setTime]=useState(25);
  const[act,setAct]=useState(true);
  const scoreRef=useRef(0);
  const livesRef=useRef(3);
  const posRef=useRef(3);
  posRef.current=pos;

  // Timer
  useEffect(()=>{
    const iv=setInterval(()=>setTime(t=>{if(t<=1){setAct(false);clearInterval(iv);return 0}return t-1}),1000);
    return()=>clearInterval(iv);
  },[]);
  useEffect(()=>{if(!act)SFX.gameOver()},[act]);

  // Spawn + move items (slower, interval-based)
  useEffect(()=>{
    if(!act)return;
    let tick=0;
    const iv=setInterval(()=>{
      tick++;
      // Spawn every 6 ticks (~900ms)
      if(tick%6===0){
        const isBomb=Math.random()<0.25;
        setItems(p=>[...p,{x:Math.floor(Math.random()*W),y:0,bomb:isBomb,id:Date.now()+Math.random()}]);
      }
      // Move down every 3 ticks (~450ms)
      if(tick%3===0){
        setItems(p=>{
          let caught=0,bombed=0;
          const next=[];
          for(const i of p){
            const ny=i.y+1;
            if(ny>=H-1&&i.x===posRef.current){
              if(i.bomb)bombed++;else caught++;
            }else if(ny>=H){
              // missed
            }else{
              next.push({...i,y:ny});
            }
          }
          if(caught>0){scoreRef.current+=caught;setScore(scoreRef.current);SFX.starCatch()}
          if(bombed>0){livesRef.current-=bombed;setLives(livesRef.current);SFX.rpsLose();if(livesRef.current<=0)setAct(false)}
          return next;
        });
      }
    },150);
    return()=>clearInterval(iv);
  },[act]);

  if(!act){
    const coins=scoreRef.current*4;
    return(<div style={{textAlign:"center",padding:16}}>
      <div style={{fontSize:14,fontWeight:900,color:"#2b1d34",marginBottom:6}}>게임 종료!</div>
      <div style={{fontSize:20,fontWeight:900,color:"#7ed4a8",marginBottom:4}}>{scoreRef.current}개</div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:3,marginBottom:14}}><PxI n="coin" size={14}/><span style={{fontSize:12,color:"#888"}}>+{coins}</span></div>
      <button className="btn btn-m" onClick={()=>onEnd(coins)}>확인</button>
    </div>);
  }
  return(<div style={{textAlign:"center"}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,padding:"0 4px"}}>
      <span style={{display:"flex",alignItems:"center",gap:2,fontSize:10,fontWeight:700,color:"#888"}}><PxI n="coin" size={12}/>{score}</span>
      <span style={{fontSize:10,fontWeight:700,color:"#888"}}>{"♥".repeat(livesRef.current)}{"♡".repeat(3-livesRef.current)}</span>
      <span style={{fontSize:10,fontWeight:700,color:time<=5?"#ff4d6d":"#888"}}>⏱{time}s</span>
    </div>
    <div style={{position:"relative",width:W*CELL,height:H*CELL,margin:"0 auto",background:"linear-gradient(180deg,#1a1028,#2a1848)",borderRadius:6,overflow:"hidden",border:"2px solid #3a2a4a"}}>
      {items.map(i=><div key={i.id} style={{position:"absolute",left:i.x*CELL+3,top:i.y*CELL,fontSize:14}}>
        {i.bomb?<span>💣</span>:<PxI n="coin" size={16}/>}
      </div>)}
      <div style={{position:"absolute",left:pos*CELL,bottom:0,width:CELL,height:24,display:"flex",alignItems:"flex-end",justifyContent:"center"}}><PxChar ch={pet} size={20}/></div>
    </div>
    <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:6}}>
      <button className="btn btn-s" onClick={()=>setPos(p=>Math.max(0,p-1))} style={{padding:"7px 18px"}}>◀</button>
      <button className="btn btn-s" onClick={()=>setPos(p=>Math.min(W-1,p+1))} style={{padding:"7px 18px"}}>▶</button>
    </div>
  </div>);
}

/* ═══ 피해피해 (Jump Runner) ═══ */
function RunGame({pet,onEnd}){
  const W=160,H=120,GY=95;
  const[score,setScore]=useState(0);
  const[act,setAct]=useState(true);
  const[py,setPy]=useState(GY);
  const[obs,setObs]=useState([]);
  const s=useRef({py:GY,vy:0,jumping:false,score:0,act:true,obs:[],tick:0,spawnCd:0});

  const jump=()=>{if(s.current.act&&!s.current.jumping){SFX.click();s.current.vy=-4.5;s.current.jumping=true}};

  useEffect(()=>{
    if(!act)return;
    const iv=setInterval(()=>{
      const c=s.current;if(!c.act)return;
      c.tick++;
      // Gravity
      c.vy+=0.35;c.py+=c.vy;
      if(c.py>=GY){c.py=GY;c.vy=0;c.jumping=false}
      setPy(c.py);
      // Spawn obstacles
      c.spawnCd--;
      if(c.spawnCd<=0){
        const tall=Math.random()<0.3;
        c.obs.push({x:W+5,w:tall?10:8,h:tall?18:10,id:Date.now()+Math.random()});
        c.spawnCd=Math.max(15,40-Math.floor(c.tick/50));
      }
      // Move obstacles
      const spd=2+c.tick*0.005;
      c.obs=c.obs.map(o=>({...o,x:o.x-spd})).filter(o=>o.x>-15);
      setObs([...c.obs]);
      // Collision (pet at x=20, width~14, height~16)
      const petL=20,petR=34,petT=c.py-16,petB=c.py;
      for(const o of c.obs){
        if(petR>o.x&&petL<o.x+o.w&&petB>GY-o.h){
          c.act=false;setAct(false);SFX.gameOver();return;
        }
      }
      // Score
      c.score=Math.floor(c.tick/5);setScore(c.score);
    },50);
    return()=>clearInterval(iv);
  },[act]);

  if(!act){
    const coins=Math.min(40,Math.floor(s.current.score/3));
    return(<div style={{textAlign:"center",padding:16}}>
      <div style={{fontSize:14,fontWeight:900,color:"#2b1d34",marginBottom:6}}>게임 종료!</div>
      <div style={{fontSize:20,fontWeight:900,color:"#ff4d6d",marginBottom:4}}>{s.current.score}m</div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:3,marginBottom:14}}><PxI n="coin" size={14}/><span style={{fontSize:12,color:"#888"}}>+{coins}</span></div>
      <button className="btn btn-m" onClick={()=>onEnd(coins)}>확인</button>
    </div>);
  }
  return(<div style={{textAlign:"center"}}>

/* ═══ 쏘아쏘아 (Timing Shot) ═══ */
function ShotGame({pet,onEnd}){
  const W=7,CELL=22;
  const[arrow,setArrow]=useState(0);
  const[arrowDir,setArrowDir]=useState(1);
  const[target,setTarget]=useState(()=>Math.floor(Math.random()*W));
  const[score,setScore]=useState(0);
  const[miss,setMiss]=useState(0);
  const[flash,setFlash]=useState(null);// 'hit' or 'miss'
  const[act,setAct]=useState(true);
  const[round,setRound]=useState(0);
  const[spd,setSpd]=useState(180);
  const arrowRef=useRef(0);
  const dirRef=useRef(1);
  const targetRef=useRef(target);
  const actRef=useRef(true);
  const scoreRef=useRef(0);
  const missRef=useRef(0);

  arrowRef.current=arrow;dirRef.current=arrowDir;targetRef.current=target;actRef.current=act;

  // Arrow sweep
  useEffect(()=>{
    if(!act)return;
    const iv=setInterval(()=>{
      if(!actRef.current)return;
      const na=arrowRef.current+dirRef.current;
      if(na>=W-1){setArrowDir(-1);dirRef.current=-1;setArrow(W-1)}
      else if(na<=0){setArrowDir(1);dirRef.current=1;setArrow(0)}
      else setArrow(na);
    },spd);
    return()=>clearInterval(iv);
  },[act,spd]);

  const shoot=()=>{
    if(!actRef.current||flash)return;
    SFX.click();
    if(arrowRef.current===targetRef.current){
      // Hit!
      scoreRef.current++;setScore(scoreRef.current);
      setFlash('hit');SFX.cardMatch();
      setTimeout(()=>{
        setFlash(null);
        const nt=Math.floor(Math.random()*W);
        setTarget(nt);targetRef.current=nt;
        setRound(r=>r+1);
        if(scoreRef.current%3===0)setSpd(s=>Math.max(60,s-20));
      },400);
    }else{
      // Miss
      missRef.current++;setMiss(missRef.current);
      setFlash('miss');SFX.rpsLose();
      setTimeout(()=>{
        setFlash(null);
        if(missRef.current>=3){setAct(false);actRef.current=false;SFX.gameOver()}
      },400);
    }
  };

  if(!act){
    const coins=scoreRef.current*6;
    return(<div style={{textAlign:"center",padding:16}}>
      <div style={{fontSize:14,fontWeight:900,color:"#2b1d34",marginBottom:6}}>게임 종료!</div>
      <div style={{fontSize:20,fontWeight:900,color:"#ffd166",marginBottom:4}}>{scoreRef.current}발 명중</div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:3,marginBottom:14}}><PxI n="coin" size={14}/><span style={{fontSize:12,color:"#888"}}>+{coins}</span></div>
      <button className="btn btn-m" onClick={()=>onEnd(coins)}>확인</button>
    </div>);
  }
  return(<div style={{textAlign:"center"}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,padding:"0 4px"}}>
      <span style={{fontSize:10,fontWeight:700,color:"#ffd166"}}>명중: {score}</span>
      <span style={{fontSize:10,fontWeight:700,color:"#ff4d6d"}}>실패: {"✕".repeat(miss)}{"○".repeat(3-miss)}</span>
    </div>
    <div style={{position:"relative",width:W*CELL,margin:"0 auto",background:"linear-gradient(180deg,#1a1028,#2a1848)",borderRadius:6,border:"2px solid #3a2a4a",padding:"10px 0",cursor:"pointer"}} onClick={shoot}>
      {/* Target row */}
      <div style={{display:"flex",justifyContent:"center",gap:0,marginBottom:8}}>
        {Array.from({length:W}).map((_,i)=><div key={i} style={{width:CELL,height:CELL,display:"flex",alignItems:"center",justifyContent:"center"}}>
          {i===target?<div style={{animation:flash==='hit'?"sparkle .4s ease":"idle 1s ease infinite"}}><PxI n="star" size={18}/></div>:null}
        </div>)}
      </div>
      {/* Hit/miss flash */}
      {flash==='hit'&&<div style={{fontSize:16,fontWeight:900,color:"#ffd166",animation:"popIn .3s ease",marginBottom:4}}>명중!</div>}
      {flash==='miss'&&<div style={{fontSize:16,fontWeight:900,color:"#ff4d6d",animation:"popIn .3s ease",marginBottom:4}}>빗나감!</div>}
      {!flash&&<div style={{height:24,marginBottom:4}}/>}
      {/* Arrow indicator row */}
      <div style={{display:"flex",justifyContent:"center",gap:0,marginBottom:6}}>
        {Array.from({length:W}).map((_,i)=><div key={i} style={{width:CELL,height:CELL,display:"flex",alignItems:"center",justifyContent:"center"}}>
          {i===arrow?<div style={{fontSize:14,color:"#ff4d6d"}}>▲</div>:
          <div style={{width:4,height:4,borderRadius:2,background:"rgba(255,255,255,.1)"}}/>}
        </div>)}
      </div>
      {/* Pet */}
      <div style={{display:"flex",justifyContent:"center"}}><PxChar ch={pet} size={30}/></div>
    </div>
    <div style={{marginTop:6}}><button className="btn btn-s" onClick={shoot} style={{padding:"8px 24px",fontSize:11}}>쏘기!</button></div>
  </div>);
}

        x.fillRect(6,7,4,1);
        break;
      case"star_deco":
        x.fillStyle="#ffd166";
        x.fillRect(7,1,2,2);x.fillRect(6,3,4,1);
        x.fillRect(3,4,10,2);x.fillRect(4,6,8,1);
        x.fillRect(5,7,6,1);x.fillRect(4,8,3,1);x.fillRect(9,8,3,1);
        x.fillRect(3,9,2,1);x.fillRect(11,9,2,1);
        x.fillStyle="#ffe8a8";x.fillRect(7,3,2,1);x.fillRect(6,4,2,1);
        x.fillStyle="#d4a030";x.fillRect(7,11,2,4);x.fillRect(6,14,4,1);
        break;
      case"heart_deco":
        x.fillStyle="#ff4d6d";
        x.fillRect(3,4,3,1);x.fillRect(8,4,3,1);
        x.fillRect(2,5,4,2);x.fillRect(7,5,5,2);

  return <img src={src} style={{width:28,height:28,imageRendering:"pixelated"}} draggable={false}/>;
});

/* ═══ HOME SCREEN - Living Room with walking pet ═══ */
function HomeScreen({pet,hunger,happy,feedMsg,userName,inv,sick,onMedicine,petStage,onPetTouch,onRoomTouch,runawayWarn,poop,dirty,sleeping,onClean,onBath,onSleep,fridge,onFeed}){
  const[showFridge,setShowFridge]=useState(false);
  const[posX,setPosX]=useState(50);
  const[dir,setDir]=useState(1);
  const[action,setAction]=useState("walk"); // walk, idle, sleep, jump, spin, sit
  const[emote,setEmote]=useState(null);
  const actionTimer=useRef(null);
  const walkTimer=useRef(null);
  const roomRef=useRef(null);
  const[bathing,setBathing]=useState(false);
  const[eating,setEating]=useState(null); // {food, phase} phase: 0=show food, 1-3=chomp, 4=done

  // Walking behavior
  useEffect(()=>{
    const doWalk=()=>{
      if(sick||sleeping||action!=="walk")return;
      setPosX(prev=>{
        let next=prev+dir*2;
        if(next>85){setDir(-1);next=85}
        else if(next<15){setDir(1);next=15}
        return next;
      });
    };
    walkTimer.current=setInterval(doWalk,300);
    return()=>clearInterval(walkTimer.current);
  },[action,dir,sick]);

  // Random idle actions
  useEffect(()=>{
    const pickAction=()=>{
      if(sleeping){setAction("sit");setEmote(null);return}
      if(sick){setAction("sit");setEmote("sad");return}
      const mood=hunger<2?"sad":happy<2?"sad":"happy";
      const pool=mood==="sad"
        ?["walk","sit","sit","walk"]
        :["walk","walk","idle","jump","spin","walk","walk","idle"];
      const next=pool[Math.floor(Math.random()*pool.length)];
      setAction(next);
      if(next==="jump"||next==="spin"){
        const em=next==="jump"?["note","heart"][Math.floor(Math.random()*2)]:"star";
        setEmote(em);
        setTimeout(()=>{setEmote(null);setAction("walk")},1200);
      } else if(next==="idle"){
        setTimeout(()=>setAction("walk"),2000);
      } else if(next==="sit"){
        if(mood==="sad")setEmote("sad");
        setTimeout(()=>{setEmote(null);setAction("walk")},3000);
      }
    };
    actionTimer.current=setInterval(pickAction,3000+Math.random()*2000);
    return()=>clearInterval(actionTimer.current);
  },[hunger,happy,sick]);

  // Eating animation handler
  const doFeed=useCallback((f)=>{
    if(eating)return;
    setShowFridge(false);
    setEating({food:f.id,phase:0});
    // Phase 0: food appears (300ms), Phase 1-3: chomp x3 (300ms each), Phase 4: done
    setTimeout(()=>{SFX.feed();setEating(e=>e?{...e,phase:1}:null)},300);
    setTimeout(()=>setEating(e=>e?{...e,phase:2}:null),600);
    setTimeout(()=>setEating(e=>e?{...e,phase:3}:null),900);
    setTimeout(()=>{onFeed(f);setEating(null)},1200);
  },[eating,onFeed]);

  // Bath animation handler
  const doBath=useCallback(()=>{
    if(onBath&&dirty>=2){
      setBathing(true);onBath();
      setTimeout(()=>setBathing(false),1500);
    }
  },[onBath,dirty]);

  // Pixel room background
  const roomBg=useMemo(()=>mkI("room",80,50,(x)=>{
    // Floor
    x.fillStyle="#e8ddd0";x.fillRect(0,35,80,15);
    x.fillStyle="#d4c8b8";for(let i=0;i<80;i+=10)x.fillRect(i,35,1,15);
    x.fillStyle="#f0e8dc";x.fillRect(0,35,80,1);
    // Wall
    x.fillStyle="#f8f2ff";x.fillRect(0,0,80,35);
    // Window
    x.fillStyle="#c4e8f5";x.fillRect(50,6,20,16);
    x.fillStyle="#e0d4c8";x.fillRect(49,5,22,1);x.fillRect(49,22,22,1);x.fillRect(49,5,1,18);x.fillRect(70,5,1,18);
    x.fillRect(59,5,2,18);x.fillRect(49,13,22,2);
    // Curtain
    x.fillStyle="#ffcab0";x.fillRect(47,4,4,20);x.fillRect(70,4,4,20);
    // Cloud through window
    x.fillStyle="#fff";x.fillRect(54,8,4,2);x.fillRect(53,9,6,1);
    x.fillStyle="#fff";x.fillRect(63,10,3,1);x.fillRect(62,11,5,1);
    // Shelf
    x.fillStyle="#d4c8b8";x.fillRect(6,10,16,2);
    // Plant on shelf
    x.fillStyle="#7ed4a8";x.fillRect(8,6,2,4);x.fillRect(10,5,1,5);x.fillRect(12,6,2,4);
    x.fillStyle="#d06838";x.fillRect(8,10,6,3);x.fillStyle="#ff9a6c";x.fillRect(9,10,4,2);
    // Photo frame
    x.fillStyle="#d4a030";x.fillRect(16,5,6,7);x.fillStyle="#fff";x.fillRect(17,6,4,5);
    x.fillStyle="#ff8fab";x.fillRect(18,7,2,3);
    // Rug on floor
    x.fillStyle="#e8c8d8";x.fillRect(25,40,30,6);x.fillStyle="#d4a8c0";x.fillRect(26,41,28,4);
    x.fillStyle="#ffcab0";x.fillRect(30,42,18,2);
    // Clock on wall
    x.fillStyle="#fff";pxC(x,"#fff",38,8,4);x.fillStyle="#d4a030";pxC(x,"#d4a030",38,8,4);pxC(x,"#fff",38,8,3);
    x.fillStyle="#2b1d34";x.fillRect(38,6,1,3);x.fillRect(38,8,2,1);
  }),[]);

  const getCharStyle=()=>{
    const sz=petStage===0?48:petStage===1?64:80;
    const base={position:"absolute",bottom:14,left:`${posX}%`,transform:`translateX(-50%) scaleX(${dir})`,transition:"left .28s linear",imageRendering:"pixelated"};
    if(eating)return{...base,bottom:14,left:"50%",transform:"translateX(-50%)",transition:"left .3s",animation:eating.phase>=1?"chomp .3s ease":"none"};
    if(bathing)return{...base,bottom:6,left:"50%",transform:"translateX(-50%) scaleY(.85)",transition:"all .3s",filter:"brightness(1.1)"};
    if(sleeping)return{...base,bottom:4,left:"50%",transform:"translateX(-50%) scaleY(.5) scaleX(1.15)",transition:"all .5s",filter:"brightness(.85) saturate(.7)",opacity:.85};
    if(sick)return{...base,bottom:10,left:"50%",transform:"translateX(-50%)",transition:"left .5s",filter:"hue-rotate(-15deg) saturate(0.7)"};
    switch(action){
      case"jump":return{...base,animation:"petHop .4s ease infinite"};
      case"spin":return{...base,animation:"petSpin .6s ease"};
      case"sit":return{...base,bottom:10};

      default:return{...base,animation:"petHop .6s ease-in-out infinite"};

  return(<div style={{animation:"slideUp .3s ease",position:"relative",minHeight:"100%"}}>
    {/* Status bar */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4,padding:"0 2px"}}>
      <div>
        <div style={{fontSize:8,color:"#b59af8",fontWeight:700}}>{userName}님의 펫 <span style={{color:"#ffd166"}}>{petStage===0?"(아기)":petStage===1?"(꼬마)":""}</span></div>
        <div style={{fontSize:13,fontWeight:900,color:"#2b1d34"}}>{pet.name}</div>

          {poop>0&&<span style={{fontSize:7,color:"#8B6914",fontWeight:700}}>💩{poop}</span>}

    <div ref={roomRef} onClick={(e)=>{if(onRoomTouch)onRoomTouch()}}
      style={{position:"relative",width:"100%",height:"clamp(140px, 28dvh, 190px)",borderRadius:12,overflow:"hidden",background:"#f8f2ff",border:"2px solid rgba(0,0,0,.06)",cursor:"pointer"}}>

        <PxI n="fridge" size={12}/>먹이기
      </button>}
      {dirty>=2&&!bathing&&<button className="btn btn-s" onClick={doBath} style={{padding:"4px 10px",fontSize:9,display:"inline-flex",alignItems:"center",gap:2}}>
        <PxI n="bath" size={12}/>목욕
      </button>}
      {bathing&&<span style={{fontSize:9,fontWeight:700,color:"#7ec8e3",padding:"4px 10px"}}>목욕 중... 🫧</span>}
      <button className="btn btn-s" onClick={onSleep} style={{padding:"4px 10px",fontSize:9,display:"inline-flex",alignItems:"center",gap:2,background:sleeping?"linear-gradient(135deg,#2a1848,#3a2868)":""}}>
        <PxI n="sleep" size={12}/>{sleeping?"깨우기":"재우기"}
      </button>
    </div>}

    {/* Fridge overlay */}
    {showFridge&&<div style={{position:"absolute",inset:0,background:"rgba(244,236,255,.97)",borderRadius:12,zIndex:10,padding:10,overflowY:"auto",animation:"slideUp .2s ease",WebkitOverflowScrolling:"touch"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <span style={{fontSize:12,fontWeight:900,color:"#2b1d34",display:"flex",alignItems:"center",gap:4}}><PxI n="fridge" size={16}/>냉장고</span>
        <button onClick={()=>setShowFridge(false)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:"#888",padding:4}}>✕</button>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:6,justifyContent:"center"}}>
        <PxI n="hunger" size={11}/><StatBar val={hunger} max={5} color="#ff9a6c"/>
        <div style={{width:6}}/>
        <PxI n="happy" size={11}/><StatBar val={happy} max={5} color="#ff4d6d"/>
      </div>
      <div className="sec">밥</div>
      {MEALS.map(f=>{const cnt=fridge[f.id];const free=f.p===0;return<div key={f.id} className="item" onClick={()=>{if(cnt>0){doFeed(f)}}} style={{opacity:cnt>0?1:0.3,marginBottom:2}}>

        <div style={{flex:1}}>
          <div style={{fontSize:10,fontWeight:700,color:"#2b1d34"}}>{f.n} {free&&<span style={{fontSize:7,color:"#7ed4a8",fontWeight:800}}>무료</span>}</div>
          <div style={{fontSize:7,color:"#aaa"}}>{f.h>0?`배부름+${f.h} `:""}{f.hp>0?`행복+${f.hp}`:""}</div>
        </div>
        <span style={{fontSize:10,fontWeight:700,color:cnt>0?"#2b1d34":"#ccc"}}>{cnt}개</span>

        <FoodI t={f.id} size={20}/>
        <div style={{flex:1}}>
          <div style={{fontSize:10,fontWeight:700,color:"#2b1d34"}}>{f.n}</div>
          <div style={{fontSize:7,color:"#aaa"}}>{f.h>0?`배부름+${f.h} `:""}{f.hp>0?`행복+${f.hp}`:""}</div>
        </div>

    {/* Mood text */}

      {sick?"아파하고 있어요... 약을 주세요!":eating?"냠냠... 맛있다! 🍴":bathing?"목욕 중~ 기분 좋다!":sleeping?"쿨쿨... 자는 중이에요":poop>=3?"💩을 터치해서 치워주세요!":poop>=1?"방에 똥이...! 터치해서 치워주세요":dirty>=4?"목욕이 필요해요!":hunger<2?"배고파하고 있어요...":happy<2?"심심해하고 있어요...":action==="jump"?"신나게 뛰고 있어요!":action==="spin"?"빙글빙글~!":action==="sit"?"앉아서 쉬고 있어요":"돌아다니는 중..."}
    </div>
  </div>);
}

/* Need StatBar accessible to HomeScreen */
const StatBar=({val,max,color})=><div style={{display:"flex",gap:1}}>{Array.from({length:max}).map((_,i)=><div key={i} style={{width:8,height:8,borderRadius:2,background:i<Math.ceil(val)?color:"rgba(0,0,0,.05)",border:"1px solid rgba(0,0,0,.03)",transition:"background .3s"}}/>)}</div>;

/* ═══ INTRO ═══ */
const EGG_COLORS=[
  {shell:"#ffd6e0",label:"핑크 알",species:[0,1,5]},
  {shell:"#c4e8f5",label:"파랑 알",species:[1,2,6]},
  {shell:"#d5ffc4",label:"초록 알",species:[3,4,7]},
];

function IntroScreen({onComplete,okRef,onLeft,onRight}){
  const[step,setStep]=useState(0);// 0=title,1=name,2=egg,3=hatch,4=born
  const[uName,setUName]=useState("");
  const[eggIdx,setEggIdx]=useState(null);
  const[crack,setCrack]=useState(0);
  const[petName,setPetName]=useState("");
  const[born,setBorn]=useState(null);

  // Register OK action for physical button
  useEffect(()=>{
    if(step===0) okRef.current=()=>{SFX.title();setStep(1)};
    else if(step===1) okRef.current=()=>{if(uName.trim().length>=1){SFX.ok();setStep(2)}};
    else if(step===2) okRef.current=()=>{if(eggIdx!==null){SFX.ok();setStep(3)}};
    else if(step===3) okRef.current=null;
    else if(step===4&&born) okRef.current=()=>{SFX.ok();onComplete({userName:uName.trim(),pet:{...born,name:petName.trim()||born.name}})};
    return()=>{okRef.current=null};
  },[step,uName,eggIdx,born,petName]);

  // Register ◀▶ for egg selection
  useEffect(()=>{
    if(step===2){
      onLeft.current=()=>setEggIdx(p=>p===null?2:p<=0?2:p-1);
      onRight.current=()=>setEggIdx(p=>p===null?0:p>=2?0:p+1);
    } else {
      onLeft.current=null;
      onRight.current=null;
    }
    return()=>{onLeft.current=null;onRight.current=null};
  },[step]);

  useEffect(()=>{
    if(step!==3)return;
    const egg=EGG_COLORS[eggIdx];
    const si=egg.species[Math.floor(Math.random()*egg.species.length)];
    const ch=makeChar(Date.now(),si);
    const t1=setTimeout(()=>{setCrack(1);SFX.hatch1()},800);
    const t2=setTimeout(()=>{setCrack(2);SFX.hatch2()},1600);
    const t3=setTimeout(()=>{setBorn(ch);setStep(4);SFX.born()},2400);
    return()=>{clearTimeout(t1);clearTimeout(t2);clearTimeout(t3)};
  },[step,eggIdx]);

  return(<div style={{textAlign:"center",minHeight:340,display:"flex",flexDirection:"column",justifyContent:"center",padding:"10px 16px"}}>
    {step===0&&<div style={{animation:"slideUp .5s ease"}}>
      <div style={{display:"flex",justifyContent:"center",gap:4,marginBottom:10}}>
        <PxChar ch={BASE[0]} size={44} idle/><PxChar ch={BASE[2]} size={44} idle/><PxChar ch={BASE[4]} size={44} idle/>
      </div>
      <div style={{fontSize:26,fontWeight:900,background:"linear-gradient(135deg,#ff4d6d,#b59af8,#7ec8e3)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>믹싱 펫츠</div>
      <div style={{fontSize:10,fontWeight:700,color:"#b59af8",letterSpacing:3,marginTop:2}}>MIXING PETS</div>
      <div style={{fontSize:9,color:"#bbb",marginTop:6}}>캐릭터를 믹싱해서 나만의 펫을 키워보세요!</div>
      <div style={{animation:"blink 1.2s ease infinite",fontSize:12,fontWeight:700,color:"#ff8fab",cursor:"pointer",padding:12,marginTop:12}} onClick={()=>{SFX.title();setStep(1)}}>▶ 터치 또는 OK 버튼</div>
      <div style={{display:"flex",justifyContent:"center",gap:2,marginTop:8}}>{[3,4,5,6,7].map(i=><PxChar key={i} ch={BASE[i]} size={24}/>)}</div>
    </div>}

    {step===1&&<div style={{animation:"slideUp .4s ease"}}>
      <div style={{fontSize:13,fontWeight:900,color:"#2b1d34",marginBottom:4}}>당신의 이름을 알려주세요!</div>
      <div style={{fontSize:9,color:"#aaa",marginBottom:16}}>펫이 당신을 부를 이름이에요</div>
      <input type="text" maxLength={8} value={uName} onChange={e=>setUName(e.target.value)} placeholder="이름 입력..." autoFocus
        style={{width:"100%",maxWidth:200,padding:"10px 14px",borderRadius:12,border:"2px solid rgba(181,154,248,.3)",background:"rgba(255,255,255,.6)",fontSize:16,fontWeight:700,fontFamily:"inherit",textAlign:"center",outline:"none",color:"#2b1d34"}}/>
      <div style={{marginTop:16}}>
        <button className="btn btn-m" disabled={uName.trim().length<1} onClick={()=>{SFX.ok();setStep(2)}}>다음</button>
      </div>
    </div>}

    {step===2&&<div style={{animation:"slideUp .4s ease"}}>
      <div style={{fontSize:13,fontWeight:900,color:"#2b1d34",marginBottom:2}}>알을 골라주세요!</div>
      <div style={{fontSize:9,color:"#aaa",marginBottom:14}}>◀▶ 또는 터치로 선택, OK로 결정</div>
      <div style={{display:"flex",justifyContent:"center",gap:16,marginBottom:16}}>
        {EGG_COLORS.map((eg,i)=><div key={i} onClick={()=>{SFX.click();setEggIdx(i)}} style={{cursor:"pointer",padding:"12px 10px 8px",borderRadius:16,background:eggIdx===i?"rgba(255,255,255,.7)":"rgba(255,255,255,.25)",border:eggIdx===i?"2px solid #ff4d6d":"2px solid transparent",transition:"all .2s",transform:eggIdx===i?"translateY(-4px)":"none"}}>
          <PxEgg color={eg.shell} size={48} shake={eggIdx===i}/>
          <div style={{fontSize:9,fontWeight:700,color:eggIdx===i?"#ff4d6d":"#999",marginTop:4}}>{eg.label}</div>
        </div>)}
      </div>
      <button className="btn btn-m" disabled={eggIdx===null} onClick={()=>{SFX.ok();setStep(3)}}>이 알로 결정!</button>
    </div>}

    {step===3&&<div style={{animation:"slideUp .3s ease"}}>
      <div style={{fontSize:12,fontWeight:700,color:"#888",marginBottom:12}}>알이 움직이고 있어요...!</div>
      <div style={{position:"relative",display:"inline-block"}}>
        <PxEgg color={EGG_COLORS[eggIdx].shell} size={80} shake crack={crack}/>
        {crack>=1&&<div style={{position:"absolute",top:-6,right:-6,animation:"sparkle 1s ease infinite"}}><PxI n="star" size={16}/></div>}
        {crack>=2&&<div style={{position:"absolute",top:-6,left:-6,animation:"sparkle 1s ease .3s infinite"}}><PxI n="star" size={12}/></div>}
      </div>
      <div style={{marginTop:12,display:"flex",gap:3,justifyContent:"center"}}>
        {[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:4,background:i<=crack?"#ff4d6d":"rgba(0,0,0,.08)",transition:"background .3s"}}/>)}
      </div>
    </div>}

    {step===4&&born&&<div style={{animation:"slideUp .4s ease"}}>
      <div style={{fontSize:13,fontWeight:900,color:"#ff4d6d",marginBottom:8}}>짜잔! 새 친구가 태어났어요!</div>
      <PxChar ch={born} size={120} anim idle/>
      <div style={{fontSize:9,color:"#aaa",marginTop:8,marginBottom:4}}>이름을 지어주세요!</div>
      <input type="text" maxLength={6} value={petName} onChange={e=>setPetName(e.target.value)} placeholder={born.name} autoFocus
        style={{width:"100%",maxWidth:180,padding:"8px 12px",borderRadius:10,border:"2px solid rgba(255,77,109,.2)",background:"rgba(255,255,255,.6)",fontSize:16,fontWeight:700,fontFamily:"inherit",textAlign:"center",outline:"none",color:"#2b1d34"}}/>
      <div style={{marginTop:12}}>
        <button className="btn btn-m" onClick={()=>{SFX.ok();onComplete({userName:uName.trim(),pet:{...born,name:petName.trim()||born.name}})}}>키우기 시작!</button>
      </div>
    </div>}
  </div>);
}

/* ═══ MAIN APP ═══ */
const SC={HOME:"h",MIX:"mx",MIXING:"mi",RESULT:"r",GAMES:"g",GP:"gp",SHOP:"s",TREE:"t",SET:"set"};

/* ═══ SAVE / LOAD ═══ */
const SAVE_KEY='mixingpets_save';
function loadSave(){try{const d=JSON.parse(localStorage.getItem(SAVE_KEY));return d&&d.pet?d:null}catch(e){return null}}
function writeSave(d){try{localStorage.setItem(SAVE_KEY,JSON.stringify(d))}catch(e){}}

function App(){
  const saved=useMemo(()=>loadSave(),[]);
  const[started,setStarted]=useState(!!saved);
  const[muted,setMuted]=useState(false);
  const[userName,setUserName]=useState(saved?.userName||"");
  const[screen,setScreen]=useState(SC.HOME);
  const[pet,setPet]=useState(saved?.pet||null);
  const[coins,setCoins]=useState(saved?.coins??50);
  const[hunger,setHunger]=useState(saved?.hunger??5);
  const[happy,setHappy]=useState(saved?.happy??5);
  const[inv,setInv]=useState(saved?.inv||[]);
  const[history,setHistory]=useState(saved?.history||[]);
  const[datePartner,setDatePartner]=useState(null);
  const[dateStage,setDateStage]=useState(0);
  const[compat,setCompat]=useState(0);
  const[baby,setBaby]=useState(null);
  const[baby2,setBaby2]=useState(null);
  const[progress,setProgress]=useState(0);
  const[petStage,setPetStage]=useState(saved?.petStage??2);
  const[gen,setGen]=useState(saved?.gen??1);
  const[feedMsg,setFeedMsg]=useState(null);
  const[gt,setGt]=useState(null);
  const[fTree,setFTree]=useState(saved?.fTree||[]);
  const[sick,setSick]=useState(saved?.sick||false);
  const[sickCount,setSickCount]=useState(saved?.sickCount||0);
  const[dead,setDead]=useState(saved?.dead||false);
  const[careScore,setCareScore]=useState(saved?.careScore??50);
  const[runaway,setRunaway]=useState(saved?.runaway||false);
  const[runawayWarn,setRunawayWarn]=useState(false);
  const[poop,setPoop]=useState(saved?.poop||0); // 0-3 poops on floor
  const[dirty,setDirty]=useState(saved?.dirty||0); // 0-5 dirtiness
  const[sleeping,setSleeping]=useState(saved?.sleeping||false);
  const[fridge,setFridge]=useState(saved?.fridge||defaultFridge());
  const[confirmReset,setConfirmReset]=useState(false);
  const[menuIdx,setMenuIdx]=useState(0);
  const okRef=useRef(null);  // universal OK action ref
  const lRef=useRef(null);   // universal left action ref
  const rRef=useRef(null);   // universal right action ref

  const TABS=[
    {id:SC.HOME,icon:"home",label:"홈"},
    {id:SC.GAMES,icon:"game",label:"게임"},
    {id:SC.SHOP,icon:"shop",label:"상점"},
    {id:SC.MIX,icon:"mix",label:"소개팅"},
    {id:SC.TREE,icon:"tree",label:"가계도"},
  ];

  // Register OK/nav actions based on current game screen
  useEffect(()=>{
    if(!started)return;
    // Set OK action based on screen
    if(screen===SC.HOME) okRef.current=null;
    else if(screen===SC.RESULT&&baby) okRef.current=()=>keepB();
    else okRef.current=null;

    if(![SC.GP].includes(screen)){lRef.current=null;rRef.current=null}
  },[started,screen,baby]);

  // Physical button handlers
  const btnA=()=>{ // ◀ Left
    SFX.nav();
    if(lRef.current){lRef.current();return}
    if(!started)return;
    if([SC.MIXING,SC.RESULT,SC.GP].includes(screen))return;
    setMenuIdx(p=>(p-1+TABS.length)%TABS.length);
  };
  const btnB=()=>{ // OK Confirm
    // First check if any screen registered a custom OK action
    if(okRef.current){okRef.current();return}
    // Otherwise, navigate to cursor tab
    if(!started)return;
    SFX.ok();
    if([SC.MIXING,SC.GP].includes(screen))return;
    const tab=TABS[menuIdx];
    setScreen(tab.id);
    if(tab.id===SC.GAMES)setGt(null);
    if(tab.id===SC.MIX){setDatePartner(null);setDateStage(0)}
  };
  const btnC=()=>{ // ▶ Right
    SFX.nav();
    if(rRef.current){rRef.current();return}
    if(!started)return;
    if([SC.MIXING,SC.RESULT,SC.GP].includes(screen))return;
    setMenuIdx(p=>(p+1)%TABS.length);
  };

  // Sync menuIdx when screen changes via touch
  useEffect(()=>{
    const idx=TABS.findIndex(t=>t.id===screen);
    if(idx>=0)setMenuIdx(idx);
  },[screen]);

  // Keyboard support (desktop)
  const btnARef=useRef(btnA);btnARef.current=btnA;
  const btnBRef=useRef(btnB);btnBRef.current=btnB;
  const btnCRef=useRef(btnC);btnCRef.current=btnC;
  useEffect(()=>{
    const handler=(e)=>{
      if(e.target.tagName==='INPUT')return; // don't capture when typing
      if(e.key==='ArrowLeft'||e.key==='a'){e.preventDefault();btnARef.current()}
      else if(e.key==='Enter'||e.key===' '){e.preventDefault();btnBRef.current()}
      else if(e.key==='ArrowRight'||e.key==='d'){e.preventDefault();btnCRef.current()}
    };
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[]);

  // Auto-save
  useEffect(()=>{if(!started||!pet)return;writeSave({userName,pet,coins,hunger,happy,inv,history,gen,fTree,sick,sickCount,dead,petStage,careScore,runaway,poop,dirty,sleeping,fridge})},[started,pet,userName,coins,hunger,happy,inv,history,gen,fTree,sick,sickCount,dead,petStage,careScore,runaway,poop,dirty,sleeping,fridge]);

  useEffect(()=>{if(!started||dead||runaway)return;const r=sick?1.5:1;const iv=setInterval(()=>{setHunger(h=>Math.max(0,h-.08*r));setHappy(h=>Math.max(0,h-.05*r));setCareScore(c=>{let n=c;if(hunger<=0)n-=2;if(happy<=0)n-=1;if(sick)n-=1;return Math.max(0,Math.min(100,n))})},10000);return()=>clearInterval(iv)},[started,dead,sick,runaway]);

  // Sickness: triggers when hunger or happy at 0 for too long
  const sickTimerRef=useRef(null);
  useEffect(()=>{
    if(!started||!pet||dead||sick)return;
    if(hunger<=0||happy<=0){
      if(!sickTimerRef.current){
        sickTimerRef.current=setTimeout(()=>{setSick(true);SFX.sick();sickTimerRef.current=null},30000);
      }
    }else{
      if(sickTimerRef.current){clearTimeout(sickTimerRef.current);sickTimerRef.current=null}
    }
    return()=>{if(sickTimerRef.current){clearTimeout(sickTimerRef.current);sickTimerRef.current=null}};
  },[hunger,happy,started,pet,dead,sick]);

  // Death: if sick too long or 4th sickness
  const deathTimerRef=useRef(null);
  useEffect(()=>{
    if(!started||!pet||dead)return;
    if(sick){
      if(sickCount>=3){setDead(true);SFX.angel();return}
      deathTimerRef.current=setTimeout(()=>{setDead(true);SFX.angel()},90000);
    }else{
      if(deathTimerRef.current){clearTimeout(deathTimerRef.current);deathTimerRef.current=null}
    }
    return()=>{if(deathTimerRef.current){clearTimeout(deathTimerRef.current);deathTimerRef.current=null}};
  },[sick,dead,started,pet,sickCount]);

  // Growth stages: 0=baby(2min), 1=toddler(4min), 2=adult with evolution branching
  useEffect(()=>{
    if(!started||!pet||dead||runaway||petStage>=2)return;
    const dur=petStage===0?120000:240000;
    const t=setTimeout(()=>{
      if(petStage===0){
        setPetStage(1);SFX.growUp();setFeedMsg("꼬마로 성장!");setTimeout(()=>setFeedMsg(null),2000);
      }else{
        // Evolution branching based on careScore
        setPet(p=>{
          const np={...p,pal:{...p.pal}};
          if(careScore>=70){
            // Good: add deco if none
            if(np.deco==="none")np.deco=["crown","halo","flower"][Math.floor(Math.random()*3)];
            setFeedMsg("행복하게 성장했어요!");

          }else{
            setFeedMsg("무사히 성장했어요!");
          }
          return np;
        });
        setPetStage(2);SFX.growUp();setTimeout(()=>setFeedMsg(null),2500);
      }
    },dur);
    return()=>clearTimeout(t);
  },[started,pet,dead,runaway,petStage,careScore]);

  // Daily care: poop spawns every 60-120s, dirty increases every 90s

        },60000);

    }
    return()=>{if(runawayTimerRef.current){clearTimeout(runawayTimerRef.current);runawayTimerRef.current=null}};
  },[hunger,happy,started,pet,dead,runaway,sick]);

  const bringBack=useCallback(()=>{

              {!started&&<IntroScreen onComplete={({userName:u,pet:p})=>{setUserName(u);setPet(p);setStarted(true);setPetStage(0)}} okRef={okRef} onLeft={lRef} onRight={rRef}/>}

              {started&&pet&&dead&&<div style={{textAlign:"center",padding:"16px 10px",animation:"slideUp .5s ease"}}>

              {started&&pet&&!dead&&runaway&&<div style={{textAlign:"center",padding:"16px 10px",animation:"slideUp .5s ease"}}>
                <div style={{position:"relative",width:"100%",height:120,borderRadius:12,overflow:"hidden",background:"#f8f2ff",border:"2px solid rgba(0,0,0,.06)",marginBottom:10}}>
                  <img src={mkI("emptyroom",80,50,(x)=>{x.fillStyle="#e8ddd0";x.fillRect(0,35,80,15);x.fillStyle="#d4c8b8";for(let i=0;i<80;i+=10)x.fillRect(i,35,1,15);x.fillStyle="#f0e8dc";x.fillRect(0,35,80,1);x.fillStyle="#f8f2ff";x.fillRect(0,0,80,35);x.fillStyle="#c4e8f5";x.fillRect(50,6,20,16);x.fillStyle="#e0d4c8";x.fillRect(49,5,22,1);x.fillRect(49,22,22,1);x.fillRect(49,5,1,18);x.fillRect(70,5,1,18);x.fillRect(59,5,2,18);x.fillRect(49,13,22,2)})} style={{width:"100%",height:"100%",imageRendering:"pixelated",objectFit:"cover"}} draggable={false}/>
                </div>

                {screen===SC.HOME&&<HomeScreen pet={pet} hunger={hunger} happy={happy} feedMsg={feedMsg} userName={userName} inv={inv} sick={sick} onMedicine={giveMedicine} petStage={petStage} onPetTouch={handlePetTouch} onRoomTouch={handleRoomTouch} runawayWarn={runawayWarn} poop={poop} dirty={dirty} sleeping={sleeping} onClean={cleanPoop} onBath={giveBath} onSleep={toggleSleep} fridge={fridge} onFeed={feed}/>}

                  <div className="sec">간식</div>
                  {SNACKS.map(f=>{const full=fridge[f.id]>=FRIDGE_MAX;return<div key={f.id} className="item" onClick={()=>buyFood(f)} style={{opacity:(full?0.35:coins<f.p?0.3:1),marginBottom:2}}><FoodI t={f.id} size={20}/><div style={{flex:1}}><div style={{fontSize:10,fontWeight:700,color:"#2b1d34"}}>{f.n}</div><div style={{fontSize:7,color:"#aaa"}}>{f.h>0?`배부름+${f.h} `:""}{f.hp>0?`행복+${f.hp}`:""}</div></div><div style={{fontSize:8,fontWeight:700,color:"#7ec8e3",marginRight:4}}>{fridge[f.id]}/{FRIDGE_MAX}</div>{!full&&<div style={{display:"flex",alignItems:"center",gap:1}}><PxI n="coin" size={10}/><span style={{fontSize:9,fontWeight:700,color:"#d4a030"}}>{f.p}</span></div>}{full&&<span style={{fontSize:8,fontWeight:700,color:"#ff4d6d"}}>가득!</span>}</div>})}
                  <div className="sec">액세서리</div>
                  {ACCS.map(a=>{const ow=inv.includes(a.id);return<div key={a.id} className="item" onClick={()=>buyAcc(a)} style={{opacity:(ow?0.4:(coins<a.p?0.3:1))}}><RoomDeco type={a.deco}/><div style={{flex:1}}><div style={{fontSize:10,fontWeight:700,color:"#2b1d34"}}>{a.n}</div><div style={{fontSize:7,color:"#aaa"}}>{ow?"보유 중 · 방에 배치됨":a.desc}</div></div>{!ow&&<div style={{display:"flex",alignItems:"center",gap:1}}><PxI n="coin" size={10}/><span style={{fontSize:9,fontWeight:700,color:"#d4a030"}}>{a.p}</span></div>}{ow&&<span style={{fontSize:9,color:"#7ed4a8",fontWeight:800}}>✓</span>}</div>})}
                </div>}

                {screen===SC.MIX&&<div style={{animation:"slideUp .3s ease"}}>
                  <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:5}}><Back to={SC.HOME}/><span style={{fontSize:12,fontWeight:900,color:"#2b1d34"}}>소개팅</span></div>

                  {petStage<2&&<div style={{textAlign:"center",padding:"30px 10px"}}>
                    <PxChar ch={pet} size={60} idle/>
                    <div style={{fontSize:11,fontWeight:700,color:"#888",marginTop:8}}>아직 어려요!</div>
                    <div style={{fontSize:9,color:"#bbb",marginTop:3}}>더 자라야 소개팅을 갈 수 있어요</div>
                    <div style={{marginTop:8,display:"flex",gap:3,justifyContent:"center"}}>{[0,1,2].map(i=><div key={i} style={{width:24,height:4,borderRadius:2,background:i<=petStage?"#ff4d6d":"rgba(0,0,0,.08)"}}/>)}</div>
                    <div style={{fontSize:8,color:"#bbb",marginTop:4}}>{petStage===0?"아기":"꼬마"} → {petStage===0?"꼬마 → 성체":"성체"}</div>
                  </div>}

                  {petStage>=2&&dateStage===0&&<div style={{textAlign:"center",padding:"16px 10px"}}>
                    <PxChar ch={pet} size={70} idle/>
                    <div style={{fontSize:12,fontWeight:800,color:"#2b1d34",marginTop:6}}>소개팅을 가볼까요?</div>
                    <div style={{fontSize:9,color:"#bbb",marginTop:3}}>랜덤 상대를 만나 새 친구를 만들어요!</div>
                    <div style={{marginTop:12}}>
                      <button className="btn btn-m" onClick={goDate} disabled={coins<10} style={{display:"inline-flex",alignItems:"center",gap:4}}>
                        <PxI n="mix" size={14}/>만나러 가기 <span style={{fontSize:9,opacity:.7}}>10<PxI n="coin" size={9}/></span>
                      </button>
                    </div>
                    {history.length>0&&<div style={{fontSize:8,color:"#bbb",marginTop:10}}>지금까지 {history.length}마리 만남!</div>}
                  </div>}

                  {petStage>=2&&dateStage===1&&datePartner&&<div style={{textAlign:"center",padding:"14px 10px"}}>
                    <div style={{fontSize:10,fontWeight:700,color:"#888",marginBottom:8}}>두근두근... 상대가 나타나고 있어요!</div>
                    <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:16}}>
                      <div><PxChar ch={pet} size={50} idle/><div style={{fontSize:8,fontWeight:700,color:"#2b1d34",marginTop:2}}>{pet.name}</div></div>
                      <div style={{animation:"heartPop 1s ease infinite"}}><PxI n="mix" size={22}/></div>
                      <div style={{filter:"brightness(0)",opacity:.3,animation:"popIn .8s ease"}}><PxChar ch={datePartner} size={50}/><div style={{fontSize:8,color:"#bbb",marginTop:2}}>???</div></div>
                    </div>
                  </div>}

                  {petStage>=2&&dateStage===2&&datePartner&&<div style={{textAlign:"center",padding:"8px 10px",animation:"slideUp .3s ease"}}>
                    <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:14,marginBottom:8}}>
                      <div><PxChar ch={pet} size={48} idle/><div style={{fontSize:8,fontWeight:700,color:"#2b1d34",marginTop:2}}>{pet.name}</div></div>
                      <div><PxI n="mix" size={18}/></div>
                      <div style={{animation:"popIn .4s ease"}}><PxChar ch={datePartner} size={48} idle/><div style={{fontSize:8,fontWeight:700,color:"#2b1d34",marginTop:2}}>{datePartner.name}</div></div>
                    </div>
                    <div style={{marginBottom:6}}>
                      <div style={{fontSize:9,fontWeight:700,color:"#ff4d6d",marginBottom:3}}>궁합 {compat}%</div>
                      <div style={{display:"flex",gap:1,justifyContent:"center"}}>{Array.from({length:10}).map((_,i)=><div key={i} style={{width:12,height:6,borderRadius:2,background:i<Math.round(compat/10)?"#ff4d6d":"rgba(0,0,0,.06)"}}/>)}</div>
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:2,marginBottom:8}}><span className="tag">{datePartner.species}</span><span className="tag">{datePartner.eyes}눈</span>{datePartner.deco!=="none"&&<span className="tag">{datePartner.deco}</span>}</div>
                    <div style={{display:"flex",gap:6,justifyContent:"center"}}>
                      <button className="btn btn-m" onClick={acceptDate}>좋아요!</button>
                      <button className="btn btn-s" onClick={rerollDate} disabled={coins<20}>다른 친구 <span style={{fontSize:8}}>20<PxI n="coin" size={8}/></span></button>
                    </div>
                  </div>}
                </div>}

                {screen===SC.MIXING&&datePartner&&<div style={{textAlign:"center",padding:"28px 0",animation:"slideUp .3s ease"}}>
                  <div style={{position:"relative",width:140,height:140,margin:"0 auto 12px"}}><div style={{position:"absolute",left:"50%",top:"50%",marginLeft:-20,marginTop:-22,animation:"orbit1 1.4s linear infinite"}}><PxChar ch={pet} size={40}/></div><div style={{position:"absolute",left:"50%",top:"50%",marginLeft:-20,marginTop:-22,animation:"orbit2 1.4s linear infinite"}}><PxChar ch={datePartner} size={40}/></div><div style={{position:"absolute",left:"50%",top:"50%",transform:"translate(-50%,-50%)",animation:"eggShake .3s ease infinite"}}><PxEgg size={50} shake/></div></div>
                  <div style={{width:140,height:5,background:"rgba(0,0,0,.06)",borderRadius:3,margin:"0 auto",overflow:"hidden"}}><div style={{width:`${progress}%`,height:"100%",borderRadius:3,background:"linear-gradient(90deg,#ff4d6d,#b59af8,#7ec8e3)",animation:"barGlow 2s linear infinite"}}/></div>
                  <div style={{marginTop:7,fontSize:10,color:"#aaa",fontWeight:700}}>유전자 믹싱 중...</div>
                </div>}

                {screen===SC.RESULT&&baby&&<div style={{textAlign:"center",padding:"8px 0",animation:"slideUp .3s ease",position:"relative"}}>
                  {Array.from({length:6}).map((_,i)=><div key={i} style={{position:"absolute",left:`${15+Math.random()*70}%`,top:`${5+Math.random()*50}%`,animation:`sparkle ${.7+Math.random()*.5}s ease ${Math.random()}s infinite`,pointerEvents:"none"}}><PxI n="star" size={8+Math.random()*8}/></div>)}
                  <div style={{fontSize:11,color:"#999",fontWeight:700,marginBottom:6}}>{baby2?"쌍둥이가 태어났어요!":"새 친구가 태어났어요!"}</div>
                  {!baby2&&<div>
                    <div style={{display:"inline-block",background:"rgba(255,255,255,.5)",borderRadius:16,padding:"12px 20px 10px",animation:"pulse 2s ease infinite"}}><PxChar ch={baby} size={100} anim idle/><div style={{fontSize:17,fontWeight:900,color:"#2b1d34",marginTop:3}}>{baby.name}</div><div style={{marginTop:2,display:"flex",flexWrap:"wrap",justifyContent:"center",gap:2}}><span className="tag">{baby.species}</span><span className="tag">{baby.eyes}눈</span>{baby.deco!=="none"&&<span className="tag">{baby.deco}</span>}</div>{baby.parents&&<div style={{fontSize:7,color:"#bbb",marginTop:3}}>{baby.parents[0]} × {baby.parents[1]}</div>}</div>
                    <div style={{marginTop:10}}><button className="btn btn-m" onClick={()=>keepB()}>키우기</button></div>
                  </div>}
                  {baby2&&<div>
                    <div style={{display:"flex",justifyContent:"center",gap:8,marginBottom:6}}>
                      {[baby,baby2].map((b,i)=><div key={i} style={{background:"rgba(255,255,255,.5)",borderRadius:14,padding:"8px 12px 6px",cursor:"pointer",border:"2px solid transparent",transition:"all .15s"}} onClick={()=>keepB(b)}>
                        <PxChar ch={b} size={60} anim idle/><div style={{fontSize:12,fontWeight:900,color:"#2b1d34",marginTop:2}}>{b.name}</div>
                        <div style={{marginTop:1,display:"flex",flexWrap:"wrap",justifyContent:"center",gap:1}}><span className="tag" style={{fontSize:7}}>{b.species}</span></div>
                      </div>)}
                    </div>
                    <div style={{fontSize:9,color:"#888"}}>키울 아이를 선택하세요!</div>
                  </div>}
                </div>}

                {screen===SC.SET&&<div style={{animation:"slideUp .3s ease"}}>
                  <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:8}}><Back to={SC.HOME}/><span style={{fontSize:12,fontWeight:900,color:"#2b1d34"}}>설정</span></div>

                  <div className="item" onClick={()=>{const m=SFX.toggleMute();setMuted(m)}}><PxI n={muted?"sad":"happy"} size={22}/><div style={{flex:1}}><div style={{fontSize:10,fontWeight:700,color:"#2b1d34"}}>사운드</div><div style={{fontSize:7,color:"#aaa"}}>{muted?"꺼짐":"켜짐"}</div></div><span style={{fontSize:9,fontWeight:700,color:muted?"#ccc":"#7ed4a8"}}>{muted?"OFF":"ON"}</span></div>

                  <div className="item" style={{marginTop:2}}><PxI n="star" size={22}/><div style={{flex:1}}><div style={{fontSize:10,fontWeight:700,color:"#2b1d34"}}>게임 정보</div><div style={{fontSize:7,color:"#aaa"}}>Gen.{gen} · 코인 {coins} · 만남 {fTree.length}회</div></div></div>

                  <div className="item" style={{marginTop:2}}><PxI n="hunger" size={22}/><div style={{flex:1}}><div style={{fontSize:10,fontWeight:700,color:"#2b1d34"}}>돌봄 점수</div><div style={{fontSize:7,color:"#aaa"}}>현재 {careScore}점 / 100점</div></div><div style={{width:50,height:6,borderRadius:3,background:"rgba(0,0,0,.06)",overflow:"hidden"}}><div style={{width:`${careScore}%`,height:"100%",borderRadius:3,background:careScore>=70?"#7ed4a8":careScore>=30?"#ffd166":"#ff4d6d"}}/></div></div>

                  <div className="sec" style={{marginTop:12}}>위험 구역</div>

                  {!confirmReset?<div className="item" onClick={()=>setConfirmReset(true)} style={{border:"1.5px solid rgba(255,77,109,.15)"}}><PxI n="medicine" size={22}/><div style={{flex:1}}><div style={{fontSize:10,fontWeight:700,color:"#ff4d6d"}}>처음부터 다시 시작</div><div style={{fontSize:7,color:"#aaa"}}>모든 데이터가 삭제됩니다</div></div></div>
                  :<div style={{background:"rgba(255,220,230,.3)",borderRadius:9,padding:"10px",textAlign:"center"}}>
                    <div style={{fontSize:10,fontWeight:700,color:"#ff4d6d",marginBottom:6}}>정말 처음부터 다시 시작할까요?</div>
                    <div style={{fontSize:8,color:"#999",marginBottom:8}}>저장된 펫, 가계도, 코인이 모두 사라져요!</div>
                    <div style={{display:"flex",gap:6,justifyContent:"center"}}>
                      <button className="btn btn-m" style={{fontSize:10,padding:"6px 14px"}} onClick={()=>{setConfirmReset(false);restartGame();setScreen(SC.HOME)}}>네, 리셋할래요</button>
                      <button className="btn btn-s" style={{fontSize:10,padding:"6px 14px"}} onClick={()=>setConfirmReset(false)}>취소</button>
                    </div>
                  </div>}

                  <div style={{textAlign:"center",marginTop:16,fontSize:7,color:"#ccc"}}>
                    <div>믹싱 펫츠 v2.0</div>
                    <div style={{marginTop:2}}>Made with Claude</div>
                  </div>
                </div>}

                {screen===SC.TREE&&<div style={{animation:"slideUp .3s ease"}}><div style={{display:"flex",alignItems:"center",gap:5,marginBottom:8}}><Back to={SC.HOME}/><span style={{fontSize:12,fontWeight:900,color:"#2b1d34"}}>가계도</span></div>
                  {fTree.length===0?<div style={{textAlign:"center",padding:30,color:"#bbb",fontSize:10}}>아직 소개팅 기록이 없어요!<br/>소개팅으로 새 친구를 만들어보세요.</div>:
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>{fTree.map((f,i)=><div key={i} style={{background:"rgba(255,255,255,.4)",borderRadius:11,padding:"8px 10px"}}>
                    <div style={{fontSize:7,fontWeight:700,color:"#b59af8",marginBottom:4}}>Gen.{f.gen}{f.twin?" · 쌍둥이":""}</div>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                      <div style={{textAlign:"center"}}>
                        {f.p1Ch?<PxChar ch={f.p1Ch} size={32}/>:<div style={{width:32,height:32,background:"rgba(0,0,0,.04)",borderRadius:8}}/>}
                        <div style={{fontSize:7,fontWeight:700,color:"#ff4d6d",marginTop:1}}>{f.p1}</div>
                      </div>
                      <span style={{fontSize:10,color:"#ccc"}}>×</span>
                      <div style={{textAlign:"center"}}>
                        {f.p2Ch?<PxChar ch={f.p2Ch} size={32}/>:<div style={{width:32,height:32,background:"rgba(0,0,0,.04)",borderRadius:8}}/>}
                        <div style={{fontSize:7,fontWeight:700,color:"#7ec8e3",marginTop:1}}>{f.p2}</div>
                      </div>
                      <span style={{fontSize:10,color:"#ccc"}}>→</span>
                      <div style={{textAlign:"center",background:"rgba(255,209,102,.1)",borderRadius:8,padding:"3px 6px"}}>
                        {f.childCh?<PxChar ch={f.childCh} size={36}/>:<div style={{width:36,height:36,background:"rgba(0,0,0,.04)",borderRadius:8}}/>}
                        <div style={{fontSize:8,fontWeight:800,color:"#d4a030",marginTop:1}}>{f.child}</div>
                      </div>
                    </div>
                  </div>)}</div>}
                </div>}
              </>}
            </div>

            {/* Nav menu inside screen bottom */}
            {started&&!dead&&!runaway&&![SC.MIXING,SC.RESULT,SC.GP,SC.SET].includes(screen)&&(
              <div className="menu">
                {TABS.map((t,i)=><MenuBtn key={t.id} icon={t.icon} label={t.label} to={t.id} idx={i}/>)}
              </div>
            )}
          </div>
        </div>

        {/* Physical buttons */}
        <div className="device-btns">
          <button className="device-btn a" onClick={btnA}>
            <svg width="12" height="12" viewBox="0 0 12 12" style={{imageRendering:"pixelated"}}>
              <rect x="4" y="2" width="2" height="8" fill="rgba(255,255,255,.6)"/>
              <rect x="2" y="4" width="2" height="4" fill="rgba(255,255,255,.6)"/>
              <rect x="6" y="2" width="2" height="8" fill="rgba(255,255,255,.3)"/>
            </svg>
          </button>
          <button className="device-btn b" style={{width:34,height:34}} onClick={btnB}>
            <svg width="14" height="14" viewBox="0 0 14 14" style={{imageRendering:"pixelated"}}>
              <rect x="3" y="3" width="8" height="8" rx="1" fill="none" stroke="rgba(255,255,255,.5)" strokeWidth="2"/>
              <rect x="5" y="5" width="4" height="4" fill="rgba(255,255,255,.5)"/>
            </svg>
          </button>
          <button className="device-btn c" onClick={btnC}>
            <svg width="12" height="12" viewBox="0 0 12 12" style={{imageRendering:"pixelated"}}>
              <rect x="4" y="2" width="2" height="8" fill="rgba(255,255,255,.3)"/>
              <rect x="6" y="2" width="2" height="8" fill="rgba(255,255,255,.6)"/>
              <rect x="8" y="4" width="2" height="4" fill="rgba(255,255,255,.6)"/>
            </svg>
          </button>
        </div>
        <div style={{display:"flex",justifyContent:"center",gap:24,marginTop:3}}>
          <span style={{fontSize:7,fontWeight:800,color:"rgba(255,255,255,.3)",letterSpacing:1}}>◀</span>
          <span style={{fontSize:7,fontWeight:800,color:"rgba(255,255,255,.35)",letterSpacing:1}}>OK</span>
          <span style={{fontSize:7,fontWeight:800,color:"rgba(255,255,255,.3)",letterSpacing:1}}>▶</span>
        </div>
        <div className="device-label">MIXING PETS</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
